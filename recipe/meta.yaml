{% set version = "4.5.0" %}

package:
  name: jupyter-server-proxy
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyter-server-proxy/jupyter_server_proxy-{{ version }}.tar.gz
  sha256: 40835ed475fe30bea6e8f2e493fd8dfc700a7f37d86d6e97bc5298034521ac1c

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install -vv . --no-deps --no-build-isolation
  entry_points:
    - jupyter-standaloneproxy = jupyter_server_proxy.standalone:main

requirements:
  host:
    - hatch-jupyter-builder >=0.8.3
    - hatchling >=1.18.0
    - jupyterlab >=4.0.6,<5.0.0a0
    - pip
    - python {{ python_min }}
  run:
    - aiohttp
    # importlib_metadata is only really needed with Python <3.10, but this is a noarch package
    # so we can't use selectors
    - importlib-metadata >=4.8.3
    - jupyter_server >=1.24.0
    - simpervisor >=1.0.0
    - tornado >=6.1.0
    - traitlets >=5.1.1
    - python >={{ python_min }}

test:
  requires:
    - jupyterlab >=4.0.6,<5.0.0a0
    - m2-grep  # [win]
    - pip
    - python {{ python_min }}
    # For jupyter-standaloneproxy only
    - jupyterhub-base
  commands:
    - pip check
    # print everything
    - pip list
    - jupyter labextension list
    - jupyter server extension list
    # output each
    - pip list 1>pip_list 2>&1
    - jupyter server extension list 1>server_extensions 2>&1
    - jupyter labextension list 1>labextensions 2>&1
    # check each
    - grep -iE "jupyter_server_proxy\s*{{ version.replace(".", "\\.") }}"                 pip_list
    - grep -iE "jupyter_server_proxy.*OK"                                                 server_extensions
    - grep -iE "@jupyterhub/jupyter-server-proxy.*{{ version.replace(".", "\\.") }}.*OK"  labextensions
    - "jupyter-standaloneproxy --help | grep 'Usage: jupyter standaloneproxy'"
    - "jupyter-standaloneproxy --no-authentication --port=12345 -- python -mhttp.server '{port}' & sleep 1; curl http://localhost:12345 | grep '<title>Directory listing for /</title>'"
  imports:
    - jupyter_server_proxy

about:
  home: https://github.com/jupyterhub/jupyter-server-proxy
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - jupyter_server_proxy/labextension/static/third-party-licenses.json
  summary: Jupyter server extension to supervise and proxy web services
  description: |
    Jupyter Server Proxy lets you run arbitrary external processes (such as
    RStudio, Shiny Server, syncthing, PostgreSQL, etc) alongside your notebook,
    and provide authenticated web access to them.
  doc_url: https://jupyter-server-proxy.readthedocs.io
  dev_url: https://github.com/jupyterhub/jupyter-server-proxy

extra:
  recipe-maintainers:
    - jakirkham
    - lsetiawan
    - minrk
    - ocefpaf
    - xhochy
    - consideratio
    - bollwyvl
    - manics
