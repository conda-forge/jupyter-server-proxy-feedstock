# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.5.0"
  jupyterlab_min: "4.0.6"
  jupyterlab_max: "5.0.0a0"
  python_check_max: "3.14s"

package:
  name: jupyter-server-proxy
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyter-server-proxy/jupyter_server_proxy-${{ version }}.tar.gz
  sha256: 40835ed475fe30bea6e8f2e493fd8dfc700a7f37d86d6e97bc5298034521ac1c

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install -vv . --no-deps --no-build-isolation
  python:
    entry_points:
      - jupyter-standaloneproxy = jupyter_server_proxy.standalone:main

requirements:
  host:
    - hatch-jupyter-builder >=0.8.3
    - hatchling >=1.18.0
    - jupyterlab >=${{ jupyterlab_min }},<${{ jupyterlab_max }}
    - pip
    - python ${{ python_min }}.*
  run:
    - aiohttp
    - jupyter_server >=1.24.0
    - simpervisor >=1.0.0
    - tornado >=6.1.0
    - traitlets >=5.1.1
    - python >=${{ python_min }}

tests:
  - python:
      imports: jupyter_server_proxy
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - requirements:
      run:
        - jupyterhub-base
        - jupyterlab ${{ jupyterlab_min }}.*
        - pip
        - python ${{ python_min }}.*
    script:
      file: run_test.py

about:
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - jupyter_server_proxy/labextension/static/third-party-licenses.json
  summary: Jupyter server extension to supervise and proxy web services
  description: |
    Jupyter Server Proxy lets you run arbitrary external processes (such as
    RStudio, Shiny Server, syncthing, PostgreSQL, etc) alongside your notebook,
    and provide authenticated web access to them.
  homepage: https://pypi.org/project/jupyter-server-proxy
  repository: https://github.com/jupyterhub/jupyter-server-proxy
  documentation: https://jupyter-server-proxy.readthedocs.io

extra:
  recipe-maintainers:
    - jakirkham
    - lsetiawan
    - minrk
    - ocefpaf
    - xhochy
    - consideratio
    - bollwyvl
    - manics
